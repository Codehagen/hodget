<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Hodget run pipeline: data, analysts, committee, gate, portfolio">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#fafafa" fill-opacity="0.5"/>
    </marker>
  </defs>
  <rect width="1200" height="360" fill="url(#pbg)"/>
  <g font-family="Geist, Inter, system-ui, sans-serif" text-anchor="middle">
    <g>
      <rect x="60" y="130" width="180" height="100" rx="14" fill="#fafafa" fill-opacity="0.05" stroke="#fafafa" stroke-opacity="0.25"/>
      <text x="150" y="172" font-size="22" font-weight="700" fill="#fafafa">Data</text>
      <text x="150" y="200" font-size="15" fill="#fafafa" fill-opacity="0.55">point-in-time</text>
    </g>
    <g>
      <rect x="300" y="130" width="180" height="100" rx="14" fill="#fafafa" fill-opacity="0.05" stroke="#fafafa" stroke-opacity="0.25"/>
      <text x="390" y="172" font-size="22" font-weight="700" fill="#fafafa">Analysts</text>
      <text x="390" y="200" font-size="15" fill="#fafafa" fill-opacity="0.55">independent signals</text>
    </g>
    <g>
      <rect x="540" y="130" width="180" height="100" rx="14" fill="#fafafa" fill-opacity="0.05" stroke="#fafafa" stroke-opacity="0.25"/>
      <text x="630" y="172" font-size="22" font-weight="700" fill="#fafafa">Committee</text>
      <text x="630" y="200" font-size="15" fill="#fafafa" fill-opacity="0.55">debate → conviction</text>
    </g>
    <g>
      <rect x="780" y="130" width="180" height="100" rx="14" fill="#fafafa" fill-opacity="0.05" stroke="#fafafa" stroke-opacity="0.25"/>
      <text x="870" y="172" font-size="22" font-weight="700" fill="#fafafa">Risk gate</text>
      <text x="870" y="200" font-size="15" fill="#fafafa" fill-opacity="0.55">clips &amp; vetoes</text>
    </g>
    <g>
      <rect x="1020" y="130" width="120" height="100" rx="14" fill="#fafafa" fill-opacity="0.1" stroke="#fafafa" stroke-opacity="0.4"/>
      <text x="1080" y="172" font-size="22" font-weight="700" fill="#fafafa">Fills</text>
      <text x="1080" y="200" font-size="15" fill="#fafafa" fill-opacity="0.55">next session</text>
    </g>
    <g stroke="#fafafa" stroke-opacity="0.5" stroke-width="2">
      <line x1="240" y1="180" x2="292" y2="180" marker-end="url(#arrow)"/>
      <line x1="480" y1="180" x2="532" y2="180" marker-end="url(#arrow)"/>
      <line x1="720" y1="180" x2="772" y2="180" marker-end="url(#arrow)"/>
      <line x1="960" y1="180" x2="1012" y2="180" marker-end="url(#arrow)"/>
    </g>
  </g>
</svg>
